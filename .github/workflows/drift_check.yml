name: Drift Check

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8am UTC
  workflow_dispatch:

jobs:
  check-drift:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download prediction logs from S3
        id: download
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_ENDPOINT: ${{ secrets.AWS_S3_ENDPOINT }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          mkdir -p logs
          uv run python - <<'EOF'
          import boto3, os, sys
          bucket   = os.environ["AWS_BUCKET_NAME"]
          endpoint = os.environ["AWS_S3_ENDPOINT"]
          s3 = boto3.client("s3", endpoint_url=f"https://{endpoint}")
          try:
              s3.download_file(bucket, "logs/predictions.jsonl", "logs/predictions.jsonl")
              print("Logs downloaded successfully.")
          except s3.exceptions.NoSuchKey:
              print("No prediction logs found on S3 — skipping drift check.")
          EOF
          if [ -s logs/predictions.jsonl ]; then
            echo "has_logs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_logs=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No prediction logs yet — drift check skipped."
          fi

      - name: Run drift analysis
        id: drift
        if: steps.download.outputs.has_logs == 'true'
        run: |
          uv run python src/drift_analysis.py --fail-on-drift \
            && echo "drift=false" >> $GITHUB_OUTPUT \
            || echo "drift=true"  >> $GITHUB_OUTPUT

      - name: Trigger retraining
        if: steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'retrain.yml',
              ref: 'developement',
            });
            core.notice('Drift detected — retraining workflow triggered!');
