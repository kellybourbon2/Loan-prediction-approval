name: CD

on:
  push:
    branches: [ossama]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}

      - name: Update image tag in k8s/deployment.yaml
        run: |
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}"
          sed -i "s|image:.*loan-api.*|image: ${IMAGE}|" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update loan-api image to ${{ github.sha }}"
          git push
