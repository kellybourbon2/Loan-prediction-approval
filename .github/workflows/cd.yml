name: CD

on:
  push:
    branches: [deployment-kubernetes]
    paths:
      - "k8s/deployment.yaml"

jobs:
  post-deploy-check:
    runs-on: ubuntu-latest
    if: ${{ vars.API_URL != '' }}

    steps:
      - name: Wait for ArgoCD to sync and pod to be ready
        run: sleep 60

      - name: Healthcheck — verify /health returns 200
        id: healthcheck
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Healthcheck failed — /health returned $STATUS"
            exit 1
          fi
          echo "Healthcheck passed (HTTP $STATUS)"

      - name: Rollback — revert k8s/deployment.yaml to previous image on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Push rollback commit
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout HEAD~1 -- k8s/deployment.yaml
          git add k8s/deployment.yaml
          git commit -m "ci: rollback deployment — healthcheck failed for ${{ github.sha }}"
          git pull --rebase origin deployment-kubernetes
          git push origin deployment-kubernetes