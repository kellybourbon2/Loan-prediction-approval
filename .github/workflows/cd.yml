name: CD

on:
  push:
    branches: [deployment-kubernetes]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/cd.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}

      - name: Update image tag in deployment/deployment.yaml
        run: |
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}"
          sed -i "s|image:.*loan-api.*|image: ${IMAGE}|" deployment/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update loan-api image to ${{ github.sha }}"
          git pull --rebase origin main
          git push origin main

  post-deploy-check:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.API_URL != '' }}

    steps:
      - name: Wait for ArgoCD to sync and pod to be ready
        run: sleep 60

      - name: Healthcheck — verify /health returns 200
        id: healthcheck
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.API_URL }}/health" || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Healthcheck failed — /health returned $STATUS"
            exit 1
          fi
          echo "Healthcheck passed (HTTP $STATUS)"

      - name: Rollback — revert deployment.yaml to previous image on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Push rollback commit
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Restore deployment/deployment.yaml from the commit before the CD push
          git checkout HEAD~1 -- deployment/deployment.yaml 
          git add deployment/deployment.yaml
          git commit -m "ci: rollback deployment — healthcheck failed for ${{ github.sha }}"
          git pull --rebase origin main
          git push origin HEAD:main
