name: CI

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "unit_tests/**"

  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run unit tests
        run: uv run pytest unit_tests/ -v --ignore=unit_tests/test_integration.py

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ vars.API_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests against deployed API
        env:
          INTEGRATION_API_URL: ${{ vars.API_URL }}
        run: uv run pytest unit_tests/test_integration.py -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'  

    steps:
      - uses: actions/checkout@v4  

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: kellybourbon2/Loan-prediction-approval-deployment
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in GitOps repo
        run: |
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}"
          sed -i "s|image:.*loan-api.*|image: ${IMAGE}|" gitops/deployment/deployment.yaml

      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update loan-api image to ${{ github.sha }}"
          git push origin main