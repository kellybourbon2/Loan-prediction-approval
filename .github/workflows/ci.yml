name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "unit_tests/**"

  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run unit tests
        run: uv run pytest unit_tests/ -v --ignore=unit_tests/test_integration.py

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ vars.API_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests against deployed API
        env:
          INTEGRATION_API_URL: ${{ vars.API_URL }}
        run: uv run pytest unit_tests/test_integration.py -v

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}

      - name: Update image tag in deployment/deployment.yaml
        run: |
          IMAGE="${{ vars.DOCKERHUB_USERNAME }}/loan-api:${{ github.sha }}"
          sed -i "s|image:.*loan-api.*|image: ${IMAGE}|" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update loan-api image to ${{ github.sha }}"
          git pull --rebase origin deployment-kubernetes
          git push origin deployment-kubernetes