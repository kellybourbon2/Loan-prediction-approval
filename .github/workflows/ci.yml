name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run unit tests
        run: uv run pytest unit_tests/ -v --ignore=unit_tests/test_integration.py

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ vars.API_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests against deployed API
        env:
          INTEGRATION_API_URL: ${{ vars.API_URL }}
        run: uv run pytest unit_tests/test_integration.py -v
