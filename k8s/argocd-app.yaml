apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loan-prediction-api
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kellybourbon2/Loan-prediction-approval
    targetRevision: main
    path: k8s
    # Exclude the ArgoCD app manifest itself and secret template
    directory:
      exclude: "argocd-app.yaml,secret.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: loan-prediction

  syncPolicy:
    automated:
      prune: true      # remove resources deleted from git
      selfHeal: true   # revert manual changes on the cluster
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
