apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-api
  namespace: user-oualy
  labels:
    app: loan-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loan-api
  template:
    metadata:
      labels:
        app: loan-api
      annotations:
        git-sync/force-restart: "2026-04-15"
    spec:
      containers:
        - name: loan-api
          image: oualyoss/loan-api:1f2de52e0bbec437686295a4fdb3079ea4b3bbcb
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /mlflow-secret/mlflow.db /tmp/mlflow.db
              exec uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000

          env:
            - name: MLFLOW_TRACKING_URI
              value: "sqlite:////tmp/mlflow.db"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "https://minio.lab.sspcloud.fr"

          envFrom:
            - secretRef:
                name: loan-api-secret

          volumeMounts:
            - name: mlflow-db
              mountPath: /mlflow-secret
              readOnly: true

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10

      volumes:
        - name: mlflow-db
          secret:
            secretName: mlflow-db
