apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-api
  namespace: loan-prediction
  labels:
    app: loan-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loan-api
  template:
    metadata:
      labels:
        app: loan-api
    spec:
      containers:
        - name: loan-api
          # Tag is updated automatically by the CD GitHub Actions workflow (GitOps)
          image: ghcr.io/kellybourbon2/loan-prediction-approval:main  # {"$imagepolicy": "loan-prediction:loan-api"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          envFrom:
            - secretRef:
                name: loan-api-secret

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
