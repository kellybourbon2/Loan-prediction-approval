apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-deployer
  namespace: user-oualy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitops-deployer
  namespace: user-oualy
rules:
- apiGroups: [""]
  resources: ["configmaps", "services", "persistentvolumeclaims", "secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitops-deployer
  namespace: user-oualy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitops-deployer
subjects:
- kind: ServiceAccount
  name: gitops-deployer
  namespace: user-oualy
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitops-sync
  namespace: user-oualy
  labels:
    app: gitops-sync
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: gitops-deployer
          restartPolicy: OnFailure
          containers:
          - name: sync
            image: python:3.13-slim
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -e
              # Install deps
              apt-get update -qq && apt-get install -y -qq git curl ca-certificates

              # Download kubectl
              curl -sLo /usr/local/bin/kubectl \
                https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl
              chmod +x /usr/local/bin/kubectl

              pip install --quiet requests

              python3 - <<'PYEOF'
              import os, sys, subprocess
              import requests
              from datetime import datetime, timezone

              REPO      = "kellybourbon2/Loan-prediction-approval"
              BRANCH    = "ossama"
              NAMESPACE = "user-oualy"
              EXCLUDE   = {"secret.yaml", "argocd-app.yaml", "namespace.yaml", "gitops-sync.yaml"}
              STATE_CM  = "gitops-state"
              TOKEN     = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read()
              APISERVER = "https://kubernetes.default.svc"
              CACERT    = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              def kube_get(path):
                  r = requests.get(f"{APISERVER}{path}", headers={"Authorization": f"Bearer {TOKEN}"},
                                   verify=CACERT, timeout=10)
                  return r

              def kube_put(path, body):
                  r = requests.put(f"{APISERVER}{path}",
                                   headers={"Authorization": f"Bearer {TOKEN}",
                                            "Content-Type": "application/json"},
                                   json=body, verify=CACERT, timeout=10)
                  return r

              def kube_post(path, body):
                  r = requests.post(f"{APISERVER}{path}",
                                    headers={"Authorization": f"Bearer {TOKEN}",
                                             "Content-Type": "application/json"},
                                    json=body, verify=CACERT, timeout=10)
                  return r

              def get_remote_sha():
                  r = requests.get(
                      f"https://api.github.com/repos/{REPO}/commits/{BRANCH}", timeout=15)
                  r.raise_for_status()
                  return r.json()["sha"]

              def get_deployed_sha():
                  r = kube_get(f"/api/v1/namespaces/{NAMESPACE}/configmaps/{STATE_CM}")
                  if r.status_code == 404:
                      return ""
                  r.raise_for_status()
                  return r.json().get("data", {}).get("sha", "")

              def update_state(sha):
                  now = datetime.now(timezone.utc).isoformat()
                  body = {"apiVersion": "v1", "kind": "ConfigMap",
                          "metadata": {"name": STATE_CM, "namespace": NAMESPACE},
                          "data": {"sha": sha, "synced_at": now}}
                  r = kube_get(f"/api/v1/namespaces/{NAMESPACE}/configmaps/{STATE_CM}")
                  if r.status_code == 404:
                      kube_post(f"/api/v1/namespaces/{NAMESPACE}/configmaps", body).raise_for_status()
                  else:
                      kube_put(f"/api/v1/namespaces/{NAMESPACE}/configmaps/{STATE_CM}", body).raise_for_status()

              def kubectl_apply(filepath):
                  result = subprocess.run(
                      ["kubectl", "apply", "-f", filepath,
                       "-n", NAMESPACE,
                       "--server", APISERVER,
                       "--token", TOKEN,
                       "--certificate-authority", CACERT],
                      capture_output=True, text=True
                  )
                  if result.stdout:
                      print(result.stdout.strip(), flush=True)
                  if result.returncode != 0:
                      print(f"  ✗ {result.stderr.strip()}", flush=True)

              def main():
                  print("=== GitOps Sync ===", flush=True)
                  remote_sha   = get_remote_sha()
                  deployed_sha = get_deployed_sha()
                  print(f"Remote  : {remote_sha[:12]}", flush=True)
                  print(f"Deployed: {deployed_sha[:12] if deployed_sha else 'none'}", flush=True)

                  if remote_sha == deployed_sha:
                      print("Up to date — nothing to do.", flush=True)
                      sys.exit(0)

                  print("Changes detected, cloning repo...", flush=True)
                  subprocess.run(
                      ["git", "clone", "--depth=1", "--branch", BRANCH,
                       f"https://github.com/{REPO}.git", "/tmp/repo"],
                      check=True, capture_output=True
                  )

                  import glob
                  files = sorted([
                      f for f in glob.glob("/tmp/repo/k8s/*.yaml")
                      if os.path.basename(f) not in EXCLUDE
                  ])
                  print(f"Applying {len(files)} manifest files...", flush=True)

                  for fpath in files:
                      fname = os.path.basename(fpath)
                      print(f"\n[{fname}]", flush=True)
                      kubectl_apply(fpath)

                  update_state(remote_sha)
                  print(f"\n✓ Sync complete — deployed {remote_sha[:12]}", flush=True)

              main()
              PYEOF
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
